<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>deepMaze viewer</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>deepMaze</h1>
    <div class="controls">
      <label>w<input id="w" type="number" value="10" min="5" max="30"></label>
      <label>h<input id="h" type="number" value="10" min="5" max="30"></label>
      <label>density<input id="density" type="number" value="0.2" step="0.05" min="0" max="0.9"></label>
      <label>agent
        <select id="agent">
          <option>q</option><option>dqn</option><option>ppo</option>
        </select>
      </label>
      <label>episodes<input id="episodes" type="number" value="200" min="10"></label>
      <label>max steps<input id="max_steps" type="number" value="200" min="10"></label>
      <button id="regen">Regenerate maze</button>
      <button id="train">Train</button>
      <span id="status">idle</span>
    </div>
  </header>

  <main>
    <section class="board">
      <canvas id="maze" width="480" height="480"></canvas>
      <div class="legend">
        click cells to toggle: empty → wall → start → goal → empty
      </div>
    </section>
    <section class="charts">
      <canvas id="rewardChart"></canvas>
      <canvas id="lengthChart"></canvas>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
