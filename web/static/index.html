<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>deepMaze — training lab</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%2341e88d'/%3E%3Cpath d='M3 3h2v2H3zm0 4h2v2H3zm4 0h2v2H7zm4 0h2v2h-2zm0-4h2v2h-2zM3 11h2v2H3zm4 0h2v2H7zm4 0h2v2h-2z' fill='%23000'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/config.js"></script>
</head>
<body class="app">
  <header class="topbar">
    <h1>deep<span>Maze</span></h1>
    <nav>
      <a href="/" class="active">Train</a>
      <a href="/runs">Runs</a>
      <a href="/memory">Memory</a>
    </nav>
    <span class="status" id="status">idle</span>
  </header>

  <main class="three-pane">
    <!-- left: maze board + memory strip -->
    <section class="pane board">
      <div class="board-canvas" id="boardWrap">
        <canvas id="maze" width="560" height="560"></canvas>
      </div>

      <div class="memory-strip">
        <div class="memory-label" id="memLabel">memory: —</div>
        <canvas id="memory" width="480" height="44"></canvas>
        <a href="/memory" class="memory-detail">full memory →</a>
      </div>

      <div class="scrubber">
        <button id="playBtn" title="play / pause">▶</button>
        <button id="stepBtn" title="step one frame">⏭</button>
        <input id="scrub" type="range" min="0" max="0" value="0" />
        <span id="frameLabel">0 / 0</span>
      </div>

      <div class="legend">
        <span class="dot wall"></span>wall
        <span>🏠 start</span>
        <span>💎 treasure</span>
        <span>🔥 lava</span>
        <span>🤖 agent</span>
      </div>
    </section>

    <!-- center: mission console -->
    <section class="pane controls-pane">
      <div class="mode-toggle" role="tablist">
        <label class="mode-tab"><input type="radio" name="mode" value="train" checked><span>⚡ Train new</span></label>
        <label class="mode-tab"><input type="radio" name="mode" value="inference"><span>▶ Watch trained</span></label>
      </div>

      <div id="trainPanel">
        <fieldset class="console-group">
          <legend>presets</legend>
          <div class="preset-row">
            <button class="preset" data-preset="cozy">cozy<small>12×8 · 120 ep</small></button>
            <button class="preset active" data-preset="classic">classic<small>22×14 · 300 ep</small></button>
            <button class="preset" data-preset="vast">vast<small>30×20 · 600 ep</small></button>
          </div>
        </fieldset>

        <fieldset class="console-group">
          <legend>world</legend>
          <div class="config-grid">
            <label>generator
              <select id="generator">
                <option value="dfs" selected>dfs corridors</option>
                <option value="random">random walls</option>
                <option value="open">open field</option>
              </select>
            </label>
            <label>size
              <span class="pair">
                <input id="w" type="number" value="22" min="5" max="40">
                <span class="x">×</span>
                <input id="h" type="number" value="14" min="5" max="40">
              </span>
            </label>
            <label>density<input id="density" type="number" value="0.2" step="0.05" min="0" max="0.9"></label>
            <label>💎 treasures<input id="n_treasures" type="number" value="2" min="1" max="10"></label>
            <label>🔥 lava<input id="n_lava" type="number" value="0" min="0"></label>
            <label class="check-line"><input type="checkbox" id="collectAll"> collect all 💎</label>
          </div>
          <div class="toolbar">
            <span class="tb-label">paint:</span>
            <button data-paint="1" class="paint-btn active" title="floor">floor</button>
            <button data-paint="0" class="paint-btn" title="wall">wall</button>
            <button data-paint="2" class="paint-btn" title="start">🏠</button>
            <button data-paint="3" class="paint-btn" title="goal">💎</button>
            <button data-paint="4" class="paint-btn" title="lava">🔥</button>
            <span class="tb-sep"></span>
            <button id="regen">regenerate</button>
            <button id="resetEdits">reset</button>
          </div>
        </fieldset>

        <fieldset class="console-group">
          <legend>agent</legend>
          <div class="config-grid">
            <label>algorithm
              <select id="agent">
                <option value="q">q — tabular</option>
                <option value="dqn" selected>dqn — neural</option>
                <option value="ppo">ppo — policy grad</option>
                <option value="drqn">drqn — memory (lstm)</option>
                <option value="dtqn">dtqn — memory (attn)</option>
              </select>
            </label>
            <label>partial view K<input id="partial" type="number" value="" min="0" max="5" placeholder="full"></label>
            <label class="check-line"><input type="checkbox" id="shaping" checked> reward shaping <em>(guides early search)</em></label>
          </div>
        </fieldset>

        <fieldset class="console-group">
          <legend>budget</legend>
          <div class="config-grid">
            <label>episodes<input id="episodes" type="number" value="300" min="1"></label>
            <label>max steps<input id="max_steps" type="number" value="150" min="10"></label>
          </div>
        </fieldset>

        <button id="train" class="primary launch">⚡ TRAIN<small>watch it learn live — then it plays</small></button>
        <button id="stop" class="stop-btn" style="display:none">■ STOP</button>
      </div>

      <div class="config-grid" id="inferencePanel" style="display:none">
        <label style="grid-column: span 2;">model
          <select id="model"></select>
        </label>
        <label style="grid-column: span 2;">maze source
          <select id="mazeSource">
            <option value="trained">same as trained</option>
            <option value="fresh">fresh — same params</option>
            <option value="custom">custom (edit board)</option>
          </select>
        </label>
        <label>episodes<input id="infEpisodes" type="number" value="1" min="1" max="20"></label>
        <button id="watch" class="primary">▶ Watch</button>
      </div>

      <div class="overlay-toggles">
        <label><input type="checkbox" id="ovArrows" checked>policy arrows</label>
        <label><input type="checkbox" id="ovVisits">visitation trail</label>
      </div>
    </section>

    <!-- right: live telemetry -->
    <section class="pane charts">
      <div class="chart-cell"><canvas id="rewardChart"></canvas></div>
      <div class="chart-cell"><canvas id="lengthChart"></canvas></div>
      <div class="chart-cell"><canvas id="lossChart"></canvas></div>
      <div class="chart-cell"><canvas id="epsChart"></canvas></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
