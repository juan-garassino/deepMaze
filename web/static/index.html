<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>deepMaze viewer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%234ea8ff'/%3E%3Cpath d='M3 3h2v2H3zm0 4h2v2H3zm4 0h2v2H7zm4 0h2v2h-2zm0-4h2v2h-2zM3 11h2v2H3zm4 0h2v2H7zm4 0h2v2h-2z' fill='%23000'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/config.js"></script>
</head>
<body class="app">
  <header class="topbar">
    <h1>deepMaze</h1>
    <nav>
      <a href="/" class="active">Train</a>
      <a href="/runs">Runs</a>
      <a href="/memory">Memory</a>
    </nav>
    <span class="status" id="status">idle</span>
  </header>

  <main class="three-pane">
    <!-- left: maze board + memory strip -->
    <section class="pane board">
      <canvas id="maze" width="480" height="480"></canvas>

      <div class="memory-strip">
        <div class="memory-label" id="memLabel">memory: —</div>
        <canvas id="memory" width="480" height="44"></canvas>
        <a href="/memory" class="memory-detail">full memory →</a>
      </div>

      <div class="scrubber">
        <button id="playBtn" title="play / pause">▶</button>
        <button id="stepBtn" title="step one frame">⏭</button>
        <input id="scrub" type="range" min="0" max="0" value="0" />
        <span id="frameLabel">0 / 0</span>
      </div>

      <div class="legend">
        <span class="dot wall"></span>wall
        <span class="dot floor"></span>floor
        <span class="dot start"></span>start
        <span class="dot goal"></span>goal
        <span class="dot lava"></span>lava
        <span class="dot agent"></span>agent
      </div>
    </section>

    <!-- center: editor + controls -->
    <section class="pane controls-pane">
      <div class="mode-toggle">
        <label><input type="radio" name="mode" value="train" checked> Train new</label>
        <label><input type="radio" name="mode" value="inference"> Load pretrained</label>
      </div>

      <div class="toolbar">
        <span class="tb-label">paint:</span>
        <button data-paint="1" class="paint-btn active" title="floor">floor</button>
        <button data-paint="0" class="paint-btn" title="wall">wall</button>
        <button data-paint="2" class="paint-btn" title="start">start</button>
        <button data-paint="3" class="paint-btn" title="goal">goal</button>
        <button data-paint="4" class="paint-btn" title="lava">lava</button>
        <span class="tb-sep"></span>
        <button id="regen">regenerate</button>
        <button id="resetEdits">reset edits</button>
      </div>

      <div class="config-grid" id="trainPanel">
        <label>generator
          <select id="generator">
            <option value="dfs" selected>dfs</option>
            <option value="random">random</option>
            <option value="open">open</option>
          </select>
        </label>
        <label>agent
          <select id="agent">
            <option>q</option><option>dqn</option><option>ppo</option>
            <option>drqn</option><option>dtqn</option>
          </select>
        </label>
        <label>w<input id="w" type="number" value="8" min="5" max="30"></label>
        <label>h<input id="h" type="number" value="8" min="5" max="30"></label>
        <label>density<input id="density" type="number" value="0.2" step="0.05" min="0" max="0.9"></label>
        <label>n_treasures<input id="n_treasures" type="number" value="1" min="1" max="10"></label>
        <label>episodes<input id="episodes" type="number" value="80" min="1"></label>
        <label>max steps<input id="max_steps" type="number" value="60" min="10"></label>
        <label>partial K<input id="partial" type="number" value="" min="0" max="5"></label>
        <label>n_lava<input id="n_lava" type="number" value="0" min="0"></label>
        <button id="train" class="primary">Train</button>
        <button id="stop" style="display:none">Stop</button>
      </div>

      <div class="config-grid" id="inferencePanel" style="display:none">
        <label style="grid-column: span 2;">model
          <select id="model"></select>
        </label>
        <label style="grid-column: span 2;">maze source
          <select id="mazeSource">
            <option value="trained">same as trained</option>
            <option value="fresh">fresh — same params</option>
            <option value="custom">custom (edit board)</option>
          </select>
        </label>
        <label>episodes<input id="infEpisodes" type="number" value="1" min="1" max="20"></label>
        <button id="watch" class="primary">▶ Watch</button>
      </div>

      <div class="overlay-toggles">
        <label><input type="checkbox" id="ovArrows" checked>policy arrows</label>
        <label><input type="checkbox" id="ovVisits">visitation trail</label>
      </div>
    </section>

    <!-- right: live charts -->
    <section class="pane charts">
      <div class="chart-cell"><canvas id="rewardChart"></canvas></div>
      <div class="chart-cell"><canvas id="lengthChart"></canvas></div>
      <div class="chart-cell"><canvas id="lossChart"></canvas></div>
      <div class="chart-cell"><canvas id="epsChart"></canvas></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
