<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>deepMaze runs</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%234ea8ff'/%3E%3Cpath d='M3 3h2v2H3zm0 4h2v2H3zm4 0h2v2H7zm4 0h2v2h-2zm0-4h2v2h-2zM3 11h2v2H3zm4 0h2v2H7zm4 0h2v2h-2z' fill='%23000'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="app">
  <header class="topbar">
    <h1>deepMaze</h1>
    <nav>
      <a href="/">Train</a>
      <a href="/runs" class="active">Runs</a>
      <a href="/memory">Memory</a>
    </nav>
    <span class="status" id="status">loading runs…</span>
  </header>
  <section class="runs-grid" id="grid"></section>

  <script src="/static/config.js"></script>
  <script>
    const API = (p) => (window.API_BASE_URL || "") + p;
    (async function() {
      const r = await fetch(API("/api/runs/list"));
      const body = r.ok ? await r.json() : { runs: [] };
      const grid = document.getElementById("grid");
      const status = document.getElementById("status");
      if (!body.runs.length) { status.textContent = "no runs found"; return; }
      status.textContent = `${body.runs.length} runs`;
      const fmtPct = (v) => v != null ? (v * 100).toFixed(0) + "%" : "—";
      const fmtNum = (v) => v != null ? v.toFixed(2) : "—";
      for (const run of body.runs) {
        const card = document.createElement("div");
        card.className = "run-card";
        const enc = encodeURIComponent(run.name);

        const thumbDiv = document.createElement("div");
        thumbDiv.className = "thumb";
        const replay = run.artifacts.find(a => a.endsWith(".webp") || a.endsWith(".gif"));
        if (replay) {
          const img = document.createElement("img");
          img.loading = "lazy";
          img.src = API('/api/runs/' + enc + '/file/' + encodeURIComponent(replay));
          thumbDiv.appendChild(img);
        }

        const h3 = document.createElement("h3");
        h3.textContent = run.name;             // text, not HTML — XSS-safe

        const meta = document.createElement("div");
        meta.className = "meta";
        const s = run.summary || {};
        meta.append(
          `success: ${fmtPct(s.success_rate)}`, document.createElement("br"),
          `avg_reward: ${fmtNum(s.avg_reward)}`, document.createElement("br"),
          `episodes: ${s.episodes_trained ?? "—"}`,
        );

        const linkRow = document.createElement("div");
        linkRow.style.cssText = "margin-top:8px; display:flex; gap:8px; align-items:center;";
        const details = document.createElement("a");
        details.href = API(`/api/runs/${enc}/file/report.html`);
        details.target = "_blank";
        details.style.cssText = "color: var(--accent); text-decoration: none;";
        details.textContent = "details →";
        const watch = document.createElement("a");
        watch.href = `/?inference=${enc}`;
        watch.style.cssText = "color: var(--accent); text-decoration: none;";
        watch.textContent = "▶ watch";
        const del = document.createElement("button");
        del.className = "del-btn";
        del.dataset.name = run.name;
        del.title = "delete run";
        del.style.cssText = "margin-left:auto; background: transparent; color: var(--bad); border: 1px solid var(--border); padding: 2px 8px; cursor: pointer; border-radius: 3px;";
        del.textContent = "×";
        linkRow.append(details, watch, del);

        card.append(thumbDiv, h3, meta, linkRow);
        grid.appendChild(card);
      }
      // Delete handler (event delegation).
      grid.addEventListener("click", async (e) => {
        const btn = e.target.closest(".del-btn");
        if (!btn) return;
        const name = btn.dataset.name;
        if (!confirm(`delete run "${name}"?`)) return;
        const r = await fetch(API(`/api/runs/${encodeURIComponent(name)}`),
                              { method: "DELETE" });
        if (r.ok) btn.closest(".run-card").remove();
      });
    })();
  </script>
</body>
</html>
