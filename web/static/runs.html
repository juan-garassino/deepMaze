<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>deepMaze runs</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="app">
  <header class="topbar">
    <h1>deepMaze</h1>
    <nav>
      <a href="/">Train</a>
      <a href="/runs" class="active">Runs</a>
      <a href="/memory">Memory</a>
    </nav>
    <span class="status" id="status">loading runs…</span>
  </header>
  <section class="runs-grid" id="grid"></section>

  <script>
    (async function() {
      const r = await fetch("/api/runs/list");
      const body = r.ok ? await r.json() : { runs: [] };
      const grid = document.getElementById("grid");
      const status = document.getElementById("status");
      if (!body.runs.length) {
        status.textContent = "no runs found";
        return;
      }
      status.textContent = `${body.runs.length} runs`;
      for (const run of body.runs) {
        const card = document.createElement("a");
        card.href = `/runs/${encodeURIComponent(run.name)}`;
        card.className = "run-card";
        const replay = run.artifacts.find(a => a.endsWith(".webp") || a.endsWith(".gif"));
        const thumb = replay
          ? `<div class="thumb"><img loading="lazy" src="/api/runs/${encodeURIComponent(run.name)}/file/${replay}"></div>`
          : `<div class="thumb"></div>`;
        const s = run.summary || {};
        const meta = `
          <div class="meta">
            success: ${s.success_rate != null ? (s.success_rate * 100).toFixed(0) + "%" : "—"}<br>
            avg_reward: ${s.avg_reward != null ? s.avg_reward.toFixed(2) : "—"}<br>
            episodes: ${s.episodes_trained ?? "—"}
          </div>`;
        card.innerHTML = `${thumb}<h3>${run.name}</h3>${meta}`;
        grid.appendChild(card);
      }
    })();
  </script>
</body>
</html>
